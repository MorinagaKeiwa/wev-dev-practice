<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>グループ化のサンプル</title>
  </head>
  <body>
    <h1>Web 技術の紹介</h1>

    <div>
      <h2>HTML</h2>
      <p>HTML はページの構造を作るマークアップ言語です。</p>
      <p>タグを使ってテキストに意味を付けます。</p>
    </div>

    <div>
      <h2>CSS</h2>
      <p>CSS はページの見た目を整えるスタイルシート言語です。</p>
      <p>色・フォント・レイアウトなどを指定します。</p>
    </div>

    <div>
      <h2>JavaScript</h2>
      <p>JavaScript はページに動きを付けるプログラミング言語です。</p>
      <p>ボタンのクリック処理やアニメーションに使います。</p>
    </div>

    <h2>スキルの強調</h2>
    <p>
      フロントエンドで必須の言語は <span>HTML</span>・<span>CSS</span>・<span
        >JavaScript</span
      >
      です。
    </p>
    <p>中でも <span>HTML</span> が最初の一歩になります。</p>
  </body>
</html>
