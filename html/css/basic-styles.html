<!doctype html>
<html lang="ja"></html>
<head>
  <meta charset="UTF-8" />
  <title>スタイルプロパティの練習</title>
  <link rel="stylesheet" href="basic-styles.css" />
</head>
<body>
  <header class="site-header"><h1>スタイルの練習</h1></header>
  <main class="content">
    <h2>フォントとテキスト</h2>
    <p class="intro">行間を広めにした本文テキストのサンプル</p>
    <p class="note-text">※これは注記テストです(font-size 小)</p>
    <section>
      <h2>ボタンのスタイル</h2>
      <button class="btn-primary">保存する</button>
      <button class="btn-danger">削除する</button>
      <button class="btn-outline">キャンセル</button>
    </section>

    <section>
      <h2>リストのデザイン</h2>
      <ul class="nav-list">
        <li><a href="#">ホーム</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">ブログ</a></li>
        <li><a href="#">お問い合わせ</a></li>
      </ul>
    </section>

    <section>
      <h2>カードとバッジ</h2>
      <div class="card">
        <span class="badge badge-new">NEW</span>
        <h3>カードのタイトル</h3>
        <p>padding と border-radius でカード型のデザインになります。</p>
        <a href="#" class="card-link">詳しく見る →</a>
      </div>
      <div class="card">
        <span class="badge badge-done">完了</span>
        <h3>別のカード</h3>
        <p>同じクラスを使うことで統一感のあるデザインになります。</p>
        <a href="#" class="card-link">詳しく見る →</a>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <p>&copy; 2025 My Practice Site</p>
  </footer>
</body>
