    <h1>Web 開発の基礎を学ぼう</h1>

    <h2>HTML とは？</h2>
    <p>HTML はタグで文書の構造を定義するマークアップ言語です。</p>

    <h2>CSS とは？</h2>
    <p>CSS は HTML で作った構造に色や大きさなどの見た目を付ける言語です。</p>

    <h2>JavaScript とは？</h2>
    <p>JavaScript はページにボタンのクリック処理などの動きを付けるプログラミング言語です。</p>
