<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>お問い合わせ</title>
  </head>
  <body>
    <header>
      <h1>お問い合わせ</h1>
      <nav>
        <ul>
          <li><a href="blog-page.html">ホーム</a></li>
          <li><a href="profile.html">プロフィール</a></li>
          <li><a href="contact.html">お問い合わせ</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h2>お問い合わせフォーム</h2>
        <p>
          以下のフォームに必要事項をご記入の上、「送信する」ボタンをクリックしてください。
        </p>
        <p>※ <strong>太字</strong> は必須項目です。</p>

        <form>
          <p>
            <label for="contact-name"><strong>お名前：</strong></label
            ><br />
            <input
              type="text"
              id="contact-name"
              name="name"
              placeholder="例: 田中 太郎"
              required
            />
          </p>

          <p>
            <label for="contact-email"><strong>メールアドレス：</strong></label
            ><br />
            <input
              type="email"
              id="contact-email"
              name="email"
              placeholder="例: tanaka@example.com"
              required
            />
          </p>

          <p>
            <label for="contact-type"><strong>お問い合わせ種別：</strong></label
            ><br />
            <select id="contact-type" name="type">
              <option value="">-- 選択してください --</option>
              <option value="product">商品について</option>
              <option value="shipping">配送について</option>
              <option value="return">返品・交換について</option>
              <option value="other">その他</option>
            </select>
          </p>

          <p>
            <label for="contact-message"
              ><strong>お問い合わせ内容：</strong></label
            ><br />
            <textarea
              id="contact-message"
              name="message"
              rows="8"
              placeholder="お問い合わせの詳細をご記入ください"
              required
            ></textarea>
          </p>

          <p>
            <input type="checkbox" id="agree" name="agree" required />
            <label for="agree"
              ><a href="#">プライバシーポリシー</a>に同意する</label
            >
          </p>

          <p>
            <button type="submit">送信する</button>
            &nbsp;
            <button type="reset">入力をリセット</button>
          </p>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2024 田中太郎のブログ</p>
    </footer>
  </body>
</html>
